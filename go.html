<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuckSave — ยืนยันสำเร็จ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #FFF8E7 0%, #FFE9B8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .duck { width: 96px; height: 96px; object-fit: contain; margin: 0 auto 8px; display: block; }
    .check {
      width: 56px; height: 56px;
      background: #FFC233;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 30px; color: #fff;
    }
    h1 { font-size: 24px; color: #2D2A26; margin-bottom: 6px; }
    h2 { font-size: 17px; color: #8A8580; font-weight: 500; margin-bottom: 20px; }
    p { font-size: 15px; color: #6B6660; line-height: 1.6; margin-bottom: 8px; }
    .en { color: #A8A39C; font-size: 13px; margin-top: 18px; }
    .hint {
      margin-top: 28px;
      padding: 14px;
      background: #FFF8E7;
      border-radius: 14px;
      font-size: 14px;
      color: #8A6D00;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="duck" src="assets/logo-256.png" alt="DuckSave">
    <div class="check">✓</div>
    <h1>ยืนยันอีเมลสำเร็จ!</h1>
    <h2>Email confirmed!</h2>
    <p>บัญชี DuckSave ของคุณพร้อมใช้งานแล้ว</p>
    <p class="en">Your DuckSave account is ready to go.</p>
    <div class="hint">
      🐣 กลับไปเปิดแอป DuckSave แล้วเข้าสู่ระบบได้เลย<br>
      <span style="color:#A8A39C; font-size:12px;">Open the DuckSave app and sign in.</span>
    </div>
  </div>
</body>
</html>
